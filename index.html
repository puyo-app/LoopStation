<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Station - Single File</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; }
        /* スライダーの見た目を少し調整 */
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #22d3ee;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Web Audio APIの初期化（ユーザー操作後に再開が必要）
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        const ROWS = 16;
        const COLS = 16;

        const SOUND_SETS = {
            Chill: { melodyOsc: 'sine', filterFreq: 2500, decay: 0.6, color: 'bg-cyan-400', scale: [65.41, 73.42, 87.31, 98.00, 110.00, 130.81, 146.83, 174.61, 196.00, 220.00, 261.63, 293.66, 349.23, 392.00, 440.00, 523.25].reverse() },
            Midnight: { melodyOsc: 'triangle', filterFreq: 1200, decay: 1.2, color: 'bg-indigo-400', scale: [49.00, 55.00, 65.41, 73.42, 82.41, 98.00, 110.00, 130.81, 146.83, 164.81, 196.00, 220.00, 246.94, 293.66, 329.63, 392.00].reverse() },
            Future: { melodyOsc: 'square', filterFreq: 3000, decay: 0.3, color: 'bg-fuchsia-400', scale: [65.41, 77.78, 87.31, 98.00, 116.54, 130.81, 155.56, 174.61, 196.00, 233.08, 261.63, 311.13, 349.23, 392.00, 466.16, 523.25].reverse() },
            Nature: { melodyOsc: 'triangle', filterFreq: 4000, decay: 0.15, color: 'bg-emerald-400', scale: [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50].reverse() },
            Retro: { melodyOsc: 'square', filterFreq: 8000, decay: 0.1, color: 'bg-yellow-400', scale: [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33].reverse() },
            Ethereal: { melodyOsc: 'sine', filterFreq: 1500, decay: 2.5, color: 'bg-violet-300', scale: [110.00, 130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00].reverse() },
            Deep: { melodyOsc: 'sawtooth', filterFreq: 600, decay: 0.8, color: 'bg-slate-500', scale: [32.70, 36.71, 43.65, 49.00, 55.00, 65.41, 73.42, 87.31, 98.00, 110.00, 130.81, 146.83, 174.61, 196.00, 220.00, 261.63].reverse() },
            Galaxy: { melodyOsc: 'sine', filterFreq: 5000, decay: 0.2, color: 'bg-blue-300', scale: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51, 1567.98, 1760.00, 2093.00].reverse() }
        };

        const playSound = (ctx, row, time, soundSet) => {
            const freq = soundSet.scale[row];
            if (row === 15) { // Kick
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.setValueAtTime(120, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.12);
                gain.gain.setValueAtTime(0.3, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.12);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.12);
                return;
            }
            if (row === 14) { // Snare
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1500;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.12, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                noise.start(time);
                noise.stop(time + 0.1);
                return;
            }
            if (row === 13) { // Hi-hat
                const bufferSize = ctx.sampleRate * 0.05;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 9500;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.06, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                noise.start(time);
                noise.stop(time + 0.05);
                return;
            }
            if (row === 12) { // Percussion
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, time);
                osc.frequency.exponentialRampToValueAtTime(400, time + 0.03);
                gain.gain.setValueAtTime(0.08, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.03);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.03);
                return;
            }
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            const filter = ctx.createBiquadFilter();
            osc.type = soundSet.melodyOsc;
            osc.frequency.setValueAtTime(freq, time);
            filter.type = 'lowpass';
            filter.frequency.value = soundSet.filterFreq;
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.15, time + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, time + soundSet.decay);
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            osc.start(time);
            osc.stop(time + soundSet.decay + 0.2);
        };

        function App() {
            const [grid, setGrid] = useState(Array(ROWS).fill(null).map(() => Array(COLS).fill(false)));
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentStep, setCurrentStep] = useState(0);
            const [activeSet, setActiveSet] = useState('Chill');
            const [bpm, setBpm] = useState(100);
            
            const timerRef = useRef(null);
            const nextStepTimeRef = useRef(0);
            const currentStepRef = useRef(0);
            const bpmRef = useRef(bpm);

            useEffect(() => { bpmRef.current = bpm; }, [bpm]);

            const generateRandomPattern = useCallback(() => {
                const newGrid = Array(ROWS).fill(null).map((_, r) => {
                    return Array(COLS).fill(null).map((_, c) => {
                        if (r === 15) return c % 4 === 0 || (Math.random() < 0.1 && c % 8 === 6);
                        if (r === 14) return c % 8 === 4;
                        if (r === 13) return Math.random() < 0.4;
                        if (r === 12) return Math.random() < 0.1;
                        if (r < 12) return Math.random() < (r < 4 ? 0.03 : (r < 8 ? 0.05 : 0.02));
                        return false;
                    });
                });
                setGrid(newGrid);
            }, []);

            useEffect(() => { generateRandomPattern(); }, [generateRandomPattern]);

            const scheduleStep = useCallback(() => {
                const stepTime = (60 / bpmRef.current) / 4;
                while (nextStepTimeRef.current < audioCtx.currentTime + 0.1) {
                    const step = currentStepRef.current;
                    grid.forEach((row, rowIndex) => {
                        if (row[step]) playSound(audioCtx, rowIndex, nextStepTimeRef.current, SOUND_SETS[activeSet]);
                    });
                    nextStepTimeRef.current += stepTime;
                    currentStepRef.current = (step + 1) % COLS;
                    setCurrentStep(step);
                }
                timerRef.current = requestAnimationFrame(scheduleStep);
            }, [grid, activeSet]);

            useEffect(() => {
                if (isPlaying) {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    nextStepTimeRef.current = audioCtx.currentTime;
                    scheduleStep();
                } else {
                    cancelAnimationFrame(timerRef.current);
                }
                return () => cancelAnimationFrame(timerRef.current);
            }, [isPlaying, scheduleStep]);

            const toggleCell = (r, c) => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const newGrid = [...grid];
                newGrid[r] = [...newGrid[r]];
                newGrid[r][c] = !newGrid[r][c];
                setGrid(newGrid);
            };

            return (
                <div className="min-h-screen text-slate-100 flex flex-col items-center justify-center p-4 font-sans select-none">
                    <div className="w-full max-w-2xl bg-slate-900/50 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                        <div className="flex flex-col mb-6 gap-6">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                <div className="text-center sm:text-left">
                                    <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-400">Loop Station</h1>
                                    <p className="text-slate-500 text-[10px] uppercase tracking-widest mt-1">Preset: {activeSet}</p>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <button onClick={() => setIsPlaying(!isPlaying)} className={`px-6 py-2 rounded-full font-bold transition-all ${isPlaying ? 'bg-rose-500/20 text-rose-400 border border-rose-500/50' : 'bg-cyan-500 text-slate-950 hover:bg-cyan-400 shadow-lg shadow-cyan-500/20'}`}>
                                        {isPlaying ? 'STOP' : 'START'}
                                    </button>
                                    <button onClick={() => setGrid(Array(ROWS).fill(null).map(() => Array(COLS).fill(false)))} className="p-2 rounded-full border border-slate-700 text-slate-400 hover:bg-slate-800"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                                    <button onClick={generateRandomPattern} className="p-2 rounded-full border border-slate-700 text-slate-400 hover:bg-slate-800"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg></button>
                                </div>
                            </div>
                            <div className="flex items-center gap-4 bg-slate-800/30 p-3 rounded-xl border border-slate-800">
                                <span className="text-[10px] font-bold text-slate-400 min-w-[50px]">BPM {bpm}</span>
                                <input type="range" min="60" max="180" value={bpm} onChange={(e) => setBpm(parseInt(e.target.value))} className="flex-1 accent-cyan-500 h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                            </div>
                            <div className="grid grid-cols-4 gap-1.5">
                                {Object.keys(SOUND_SETS).map(setName => (
                                    <button key={setName} onClick={() => setActiveSet(setName)} className={`py-1.5 rounded text-[9px] font-bold transition-all border ${activeSet === setName ? 'bg-white text-slate-900 border-white' : 'bg-slate-900/50 text-slate-500 border-slate-800 hover:text-slate-300'}`}>{setName.toUpperCase()}</button>
                                ))}
                            </div>
                        </div>
                        <div className="relative overflow-hidden p-1 bg-slate-950/50 rounded-lg">
                            <div className="grid gap-1" style={{ gridTemplateColumns: `repeat(${COLS}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${ROWS}, minmax(0, 1fr))` }}>
                                {grid.map((row, r) => row.map((active, c) => (
                                    <div key={`${r}-${c}`} onClick={() => toggleCell(r, c)} className={`aspect-square rounded-[1px] cursor-pointer transition-all duration-150 ${active ? (r >= 12 ? 'bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.4)]' : `${SOUND_SETS[activeSet].color} shadow-[0_0_8px_rgba(255,255,255,0.2)]`) : 'bg-slate-800/40 hover:bg-slate-700/60'} ${currentStep === c ? 'brightness-150 z-10' : ''} ${(c + 1) % 4 === 0 && c !== COLS - 1 ? 'border-r border-white/10' : ''} ${(r + 1) % 4 === 0 && r !== ROWS - 1 ? 'border-b border-white/15 mb-0.5' : ''}`} />
                                )))}
                            </div>
                            <div className="absolute top-0 bottom-0 w-0.5 bg-white/40 pointer-events-none transition-all duration-75 shadow-[0_0_10px_white]" style={{ left: `calc(${(currentStep / COLS) * 100}% + (100% / ${COLS} / 2))`, display: isPlaying ? 'block' : 'none' }} />
                        </div>
                        <div className="mt-6 flex justify-between items-center px-1">
                            <div className="flex space-x-1">
                                {[...Array(4)].map((_, i) => (
                                    <div key={i} className={`h-1 w-6 rounded-full transition-colors ${Math.floor(currentStep/4) === i ? 'bg-cyan-500' : 'bg-slate-800'}`} />
                                ))}
                            </div>
                            <div className="flex gap-4 text-[9px] font-mono text-slate-600 uppercase tracking-tighter">
                                <span>{bpm} BPM</span><span>•</span><span>Bar {Math.floor(currentStep / 4) + 1}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
